name: Deploy Fullstack App to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1. Instalar dependencias del Backend (Raíz)
      - name: Install Backend Dependencies
        run: npm install

      # 2. Build del Frontend
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 3. Mover el build a la raíz para que el backend lo encuentre
      # Esto pone el contenido de frontend/dist en una carpeta llamada 'dist' en la raíz
      - name: Move Build to Root
        run: |
          mkdir -p dist
          cp -r ./frontend/dist/* ./dist/

      # 4. Deploy de todo el proyecto
      - name: Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'club-playa-resort-app-2026'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .